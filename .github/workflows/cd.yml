name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-hub-server:
    name: Publish Hub Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/hub-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: hub-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-hub:
    name: Deploy Hub Server
    runs-on: ubuntu-latest
    needs: publish-hub-server
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/hub-server:latest
            docker stop openrec-hub || true
            docker rm openrec-hub || true
            docker run -d --name openrec-hub \
              -p 8080:8080 \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e S3_BUCKET=${{ secrets.S3_BUCKET }} \
              -e S3_REGION=${{ secrets.S3_REGION }} \
              ghcr.io/${{ github.repository }}/hub-server:latest
