name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-engine:
    name: Test Engine (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Format
        run: |
          cd engine
          cargo fmt --all
          if ! git diff --exit-code; then
            echo "::error::Código não formatado."
            exit 1
          fi
      - name: Lint
        run: cd engine && cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cd engine && cargo build --workspace --verbose
      - name: Test
        run: cd engine && cargo test --workspace --verbose

  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: cd app && npm ci
      - name: Lint
        run: cd app && npm run lint --if-present
      - name: Build
        run: cd app && npm run build
      - name: Test
        run: cd app && npm test --if-present

  build-desktop:
    name: Build Desktop (Tauri) - ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: [test-engine, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: cd app && npm ci
      - name: Clean Cargo cache (Tauri)
        shell: bash
        run: |
          cd app
          cargo clean --manifest-path src-tauri/Cargo.toml
      - name: Build web assets and copy to src-tauri
        shell: bash
        run: |
          cd app
          npm run build
          rm -rf src-tauri/dist
          cp -r dist src-tauri/dist
      - name: Build Tauri app
        shell: bash
        run: |
          cd app
          npm run tauri build
        env:
          TAURI_DIST_DIR: ${{ github.workspace }}/app/dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openrec-${{ matrix.os }}
          path: |
            app/src-tauri/target/release/bundle/*.msi
            app/src-tauri/target/release/bundle/*.dmg
          if-no-files-found: ignore
