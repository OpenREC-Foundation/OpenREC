[book]
authors = ["OpenREC Foundation"]
language = "pt"
multilingual = false
src = "src"
title = "OpenREC - Documentação Oficial"
description = "Guia completo do estúdio open-source para criadores de conteúdo"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
curly-quotes = true
mathjax-support = false
copy-fonts = true
git-repository-url = "https://github.com/openrec/openrec"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/openrec/openrec/edit/main/docs/book/src/{path}"

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true
